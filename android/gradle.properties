org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Works around a Windows-only Kotlin incremental-compilation cache bug
# ("Could not close incremental caches ... .tab") that can surface when
# antivirus/OneDrive locks the cache files mid-write. Slightly slower
# incremental builds, but avoids the intermittent build failure.
# Windows-only: Gradle's file-system watcher holds file handles open,
# which conflicts with Kotlin's incremental-cache rename step and causes
# "Could not close incremental caches" build failures. Disabling it fixes
# this on Windows at the cost of slightly slower rebuild detection.
org.gradle.vfs.watch=false
kotlin.incremental=false